<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<title></title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #f7f8fa;
  --surface:  #ffffff;
  --surface2: #f0f2f5;
  --border:   #e2e5ea;
  --border2:  #c8cdd6;
  --text:     #111827;
  --text2:    #4b5563;
  --text3:    #9ca3af;
  --navy:     #1F3A5F;
  --blue:     #2563eb;
  --blue-lt:  #eff6ff;
  --blue-md:  #bfdbfe;
  --blue-tx:  #1d4ed8;
  --green:    #166534;
  --green-lt: #f0fdf4;
  --green-md: #bbf7d0;
  --red:      #dc2626;
  --red-lt:   #fef2f2;
  --code:     #1e1e2e;
  --code-out: #11111b;
  --code-sep: rgba(255, 255, 255, .07);
  --ccm:      #6c7086;
  --cst:      #a6e3a1;
  --r:        10px;
  --rsm:      6px;
  --rlg:      14px;
  --ease:     .18s ease;
}

[data-theme="dark"] {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #222535;
  --border:   #2d3148;
  --border2:  #3d4260;
  --text:     #e8eaf0;
  --text2:    #9da3b4;
  --text3:    #5c6382;
  --navy:     #93b4e0;
  --blue:     #60a5fa;
  --blue-lt:  #172038;
  --blue-md:  #1e3a5f;
  --blue-tx:  #93c5fd;
  --green:    #4ade80;
  --green-lt: #052e16;
  --green-md: #14532d;
  --red:      #f87171;
  --red-lt:   #1f0a0a;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 4rem;
  transition: background var(--ease), color var(--ease);
}

a { text-decoration: none; }
strong { font-weight: 600; }

code {
  font-family: 'DM Mono', monospace;
  font-size: .82em;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--navy);
  transition: background var(--ease), color var(--ease);
}

[data-theme="dark"] code { color: var(--blue-tx); }

.bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: .7rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--ease), border-color var(--ease);
}

.crumb {
  font-size: 13px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}

.crumb b { font-weight: 500; color: var(--text2); }

.bar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress {
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-label { font-size: 12px; color: var(--text3); }

.progress-track {
  width: 140px;
  height: 7px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--green);
  transition: width .4s ease;
}

.theme-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  transition: background var(--ease), border-color var(--ease), color var(--ease);
}

.theme-btn:hover { background: var(--border); color: var(--text); }

[data-theme="light"] .moon { display: none; }
[data-theme="dark"]  .sun  { display: none; }

.page {
  max-width: 700px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--blue-tx);
  background: var(--blue-lt);
  border: 1px solid var(--blue-md);
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: .7rem;
  transition: background var(--ease), color var(--ease), border-color var(--ease);
}

h1 {
  font-size: 30px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.2;
  margin-bottom: .4rem;
  transition: color var(--ease);
}

.meta {
  font-size: 13px;
  color: var(--text3);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 1.75rem;
}

.meta-item { display: flex; align-items: center; gap: 5px; }

.goal {
  border-left: 3px solid var(--blue);
  background: var(--blue-lt);
  border-radius: 0 var(--r) var(--r) 0;
  padding: .9rem 1.1rem;
  font-size: 14px;
  color: var(--blue-tx);
  line-height: 1.7;
  margin-bottom: 1.75rem;
  transition: background var(--ease), color var(--ease), border-color var(--ease);
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: .65rem;
  transition: color var(--ease);
}

.learn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 1.75rem;
}

@media (max-width: 520px) {
  .learn-grid { grid-template-columns: 1fr; }
}

.learn-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: .8rem .9rem;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  animation: fadeUp .3s ease both;
  transition: background var(--ease), border-color var(--ease), color var(--ease);
}

.learn-card:nth-child(1) { animation-delay: .05s; }
.learn-card:nth-child(2) { animation-delay: .10s; }
.learn-card:nth-child(3) { animation-delay: .15s; }
.learn-card svg { flex-shrink: 0; margin-top: 2px; color: var(--blue); }

hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.75rem 0;
  transition: border-color var(--ease);
}

.idea {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 1.75rem;
}

.code-wrap {
  background: var(--code);
  border: 1px solid var(--border);
  border-radius: var(--rlg);
  overflow: hidden;
  margin-bottom: 1.75rem;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .6rem 1.1rem;
  border-bottom: 1px solid var(--code-sep);
}

.code-filename { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ccm); }

.copy-btn {
  font-size: 12px;
  color: var(--ccm);
  background: rgba(255, 255, 255, .06);
  border: 1px solid rgba(255, 255, 255, .12);
  border-radius: 5px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s, color .15s;
}

.copy-btn:hover { background: rgba(255, 255, 255, .13); color: #cdd6f4; }

.run-btn {
  font-size: 12px;
  color: #a6e3a1;
  background: rgba(166, 227, 161, .12);
  border: 1px solid rgba(166, 227, 161, .25);
  border-radius: 5px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
}
.run-btn:hover:not(:disabled) { background: rgba(166, 227, 161, .22); }
.run-btn:disabled { opacity: .5; cursor: default; }

.output-error { color: #f87171 !important; }

[data-theme="light"] .code-wrap,
[data-theme="light"] .practice-editor-wrap { background: #f8fafc; }
[data-theme="light"] .code-header          { border-bottom-color: #d0d7de; }
[data-theme="light"] .output-box,
[data-theme="light"] .practice-output-box  { background: #f0f4f8; border-top-color: #d0d7de; }
[data-theme="light"] .output-label         { color: var(--text3); }
[data-theme="light"] .output-line          { color: #166534; }
[data-theme="light"] .code-filename        { color: var(--text3); }
[data-theme="light"] .copy-btn             { color: var(--text3); background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); }
[data-theme="light"] .run-btn              { color: #166534; background: rgba(22,101,52,.08); border-color: rgba(22,101,52,.2); }

.practice-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .6rem;
}

.practice-toggle-btn {
  align-self: flex-start;
  font-size: 12px;
  color: var(--blue-tx);
  background: var(--blue-lt);
  border: 1px solid var(--blue-md);
  border-radius: 5px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
}
.practice-toggle-btn:hover { opacity: .8; }

.practice-editor-wrap {
  display: none;
  background: var(--code);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.practice-ide-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: .5rem .8rem;
  border-top: 1px solid var(--code-sep);
  background: var(--code);
}

.practice-save-btn {
  font-size: 12px;
  color: var(--ccm);
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 5px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
}
.practice-save-btn:hover { background: rgba(255,255,255,.13); color: #cdd6f4; }
.practice-save-btn:disabled { opacity: .5; cursor: default; }

.practice-save-status {
  font-size: 11px;
  color: var(--ccm);
  font-family: 'DM Mono', monospace;
}

.practice-ai-row {
  display: none;
  padding: .6rem 1.2rem;
  border-top: 1px solid var(--code-sep);
  background: var(--code-out);
  font-size: 13px;
  line-height: 1.6;
  font-family: 'DM Sans', sans-serif;
}
.practice-ai-row.show { display: block; }
.practice-ai-row.correct { color: var(--cst); }
.practice-ai-row.wrong   { color: #f87171; }
[data-theme="light"] .practice-ai-row         { background: #f0f4f8; border-top-color: #d0d7de; color: var(--text2); }
[data-theme="light"] .practice-ai-row.correct { color: var(--green); }
[data-theme="light"] .practice-ai-row.wrong   { color: var(--red); }

.check-spinner {
  display: inline-block;
  width: 11px; height: 11px;
  border: 2px solid rgba(150,150,150,.3);
  border-top-color: #a6e3a1;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: -2px;
  margin-right: 7px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.practice-item.passed .practice-num {
  background: var(--green-lt);
  color: var(--green);
  border-color: var(--green-md);
}

.practice-output-box {
  background: var(--code-out);
  border-top: 1px solid var(--code-sep);
  padding: .75rem 1.2rem;
}

[data-theme="light"] .practice-ide-footer { background: #f0f4f8; border-top-color: #d0d7de; }
[data-theme="light"] .practice-save-btn   { color: var(--text3); background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); }
[data-theme="light"] .practice-save-status { color: var(--text3); }

.code-body .cm-editor,
.practice-editor-wrap .cm-editor {
  font-size: 13.5px;
}
.code-body .cm-scroller,
.practice-editor-wrap .cm-scroller {
  font-family: 'DM Mono', monospace !important;
  line-height: 1.9;
  padding: .6rem 0;
}
.code-body .cm-focused,
.practice-editor-wrap .cm-focused { outline: none; }

[data-theme="dark"] .code-body .cm-editor,
[data-theme="dark"] .code-body .cm-gutters,
[data-theme="dark"] .practice-editor-wrap .cm-editor,
[data-theme="dark"] .practice-editor-wrap .cm-gutters {
  background: #1e1e2e;
}
[data-theme="dark"] .code-body .cm-gutters,
[data-theme="dark"] .practice-editor-wrap .cm-gutters {
  border-right-color: rgba(255,255,255,.07);
}

[data-theme="light"] .code-body .cm-editor,
[data-theme="light"] .code-body .cm-gutters,
[data-theme="light"] .practice-editor-wrap .cm-editor,
[data-theme="light"] .practice-editor-wrap .cm-gutters {
  background: #f8fafc;
}
[data-theme="light"] .code-body .cm-gutters,
[data-theme="light"] .practice-editor-wrap .cm-gutters {
  border-right-color: #d0d7de;
}

.output-box {
  background: var(--code-out);
  border-top: 1px solid var(--code-sep);
  padding: .75rem 1.2rem;
}

.output-label {
  font-size: 10px;
  color: var(--ccm);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 5px;
  font-family: 'DM Mono', monospace;
}

.output-line { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--cst); line-height: 1.7; }

.practice-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 1.75rem;
}

.practice-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: .8rem 1rem;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  animation: fadeUp .3s ease both;
  transition: background var(--ease), border-color var(--ease), color var(--ease);
}

.practice-item:nth-child(1) { animation-delay: .05s; }
.practice-item:nth-child(2) { animation-delay: .10s; }

.practice-num {
  min-width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--blue-lt);
  color: var(--blue-tx);
  border: 1px solid var(--blue-md);
  font-size: 11.5px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background var(--ease), color var(--ease), border-color var(--ease);
}

.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rlg);
  overflow: hidden;
  margin-bottom: 1.75rem;
  transition: background var(--ease), border-color var(--ease);
}

.quiz-header {
  padding: .85rem 1.1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  transition: color var(--ease), border-color var(--ease);
}

.quiz-question {
  padding: 1rem 1.1rem;
  font-size: 14px;
  line-height: 1.7;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  transition: color var(--ease), border-color var(--ease);
}

.quiz-options {
  padding: .8rem 1.1rem;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: .65rem .9rem;
  border-radius: var(--rsm);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  user-select: none;
  transition: border-color .12s, background .12s, color .12s;
}

.option:hover    { border-color: var(--border2); background: var(--surface2); }
.option.selected { border-color: var(--blue);    background: var(--blue-lt);  color: var(--blue-tx); }
.option.correct  { border-color: var(--green);   background: var(--green-lt); color: var(--green);   }
.option.wrong    { border-color: var(--red);      background: var(--red-lt);   color: var(--red);     }

.option-dot {
  width: 17px;
  height: 17px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.option.selected .option-dot::after,
.option.correct  .option-dot::after {
  content: '';
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: currentColor;
}

.quiz-footer {
  padding: .8rem 1.1rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  transition: border-color var(--ease);
}

.check-btn {
  padding: .45rem 1.2rem;
  border-radius: var(--rsm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .12s, border-color .12s, color .12s;
}

.check-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); }
.check-btn:disabled { opacity: .4; cursor: default; }

.reset-btn {
  padding: .45rem 1.2rem;
  border-radius: var(--rsm);
  border: 1px solid var(--red);
  background: var(--red-lt);
  color: var(--red);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .12s, border-color .12s, opacity .12s;
  display: none;
  align-items: center;
  gap: 6px;
}
.reset-btn.show { display: inline-flex; }
.reset-btn:hover { opacity: .78; }

.quiz-options.locked .option { pointer-events: none; }
.quiz-options.locked .option:not(.correct):not(.wrong) { opacity: .35; }

.feedback { font-size: 13px; line-height: 1.5; display: none; }
.feedback.show    { display: block; }
.feedback.correct { color: var(--green); }
.feedback.wrong   { color: var(--red); }

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rlg);
  padding: 1.1rem 1.2rem;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: background var(--ease), border-color var(--ease);
}

.project-icon {
  width: 42px;
  height: 42px;
  border-radius: var(--rsm);
  background: var(--green-lt);
  color: var(--green);
  border: 1px solid var(--green-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--ease), color var(--ease), border-color var(--ease);
}

.project-icon svg { width: 22px; height: 22px; }
.project-title    { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: .3rem; transition: color var(--ease); }
.project-desc     { font-size: 13.5px; color: var(--text2); line-height: 1.6; transition: color var(--ease); }

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  gap: 10px;
}

.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: .55rem 1.2rem;
  border-radius: var(--rsm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 13.5px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  transition: background .12s, border-color .12s, color .12s;
}

.nav-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

.nav-btn.next { background: var(--navy); color: #fff; border-color: var(--navy); }
[data-theme="dark"] .nav-btn.next { background: var(--blue); border-color: var(--blue); }
.nav-btn.next:hover { opacity: .88; }

.fade { animation: fadeUp .35s ease both; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header class="bar">
  <nav class="crumb" id="crumb" aria-label="Location">
    <span id="bc-unit"></span>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
    <b id="bc-lesson"></b>
  </nav>
    <div class="bar-right">
      <a href="index.html" class="theme-btn" aria-label="Back to home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="progress">
      <span class="progress-label" id="prog-lbl"></span>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>

(async () => {

  const completeBtn = document.createElement('button');
  completeBtn.className = 'check-btn';
  function updateCompleteBtn() {

  const { data: savesData } = await db
    .from('practice_saves')

  if (savesData) {

    });
  }

  document.querySelectorAll('.practice-save-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const i = +btn.dataset.index;
      const statusEl = document.getElementById(`practice-save-status-${i}`);
      btn.disabled = true;
      statusEl.textContent = 'Saving...';
      const { error } = await db.from('practice_saves').upsert({
        user_id: session.user.id,
        unit: L.unit,
        lesson: L.lesson,
        task_index: i,
        code: practiceEditors[i].state.doc.toString(),
      }, { onConflict: 'user_id,unit,lesson,task_index' });
      btn.disabled = false;
      statusEl.textContent = error ? 'Failed to save' : 'Saved';
    });
  });

  async function sha256Hex(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function showVerdict(i, result) {
    const fb = document.getElementById(`practice-feedback-${i}`);
    fb.className = 'practice-ai-row show ' + (result.passed ? 'correct' : 'wrong');
    fb.textContent = (result.passed ? '✓ ' : '✗ ') + result.feedback +
      (result.hint ? ` Hint: ${result.hint}` : '');
    if (result.passed) document.getElementById(`practice-item-${i}`).classList.add('passed');
  }

  document.querySelectorAll('.practice-check-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const i = +btn.dataset.index;
      const fb = document.getElementById(`practice-feedback-${i}`);

      if (!localStorage.getItem('ai-disclaimer-seen')) {
        const ok = confirm('Checking sends your code to an AI service to grade it.\nDon\'t type personal information in the editor. Continue?');
        if (!ok) return;
        localStorage.setItem('ai-disclaimer-seen', '1');
      }

      btn.disabled = true;
      const code = practiceEditors[i].state.doc.toString();

      const hash = await sha256Hex(code);
      const cacheKey = `aicheck:${L.unit}:${L.lesson}:${i}:${hash}`;
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        showVerdict(i, JSON.parse(cached));
        btn.disabled = false;
        return;
      }

      const words = ['thinking…', 'analyzing…', 'understanding…', 'checking…'];
      let wi = 0;
      fb.className = 'practice-ai-row show';
      fb.innerHTML = `<span class="check-spinner"></span><span>${words[0]}</span>`;
      const ticker = setInterval(() => {
        wi = (wi + 1) % words.length;
        const span = fb.querySelector('span:last-child');
        if (span) span.textContent = words[wi];
      }, 1200);

      try {
        await db.from('practice_saves').upsert({
          user_id: session.user.id, unit: L.unit, lesson: L.lesson, task_index: i, code,
        }, { onConflict: 'user_id,unit,lesson,task_index' });

        const { output, error: runError } = await runIsolated(code);

        const { data, error } = await db.functions.invoke('grade-practice', {
          body: {
            task: practiceTasks[i].text,
            gradingNote: practiceTasks[i].gradingNote || null,
            code,
            output: runError ? `[Error] ${runError}` : output,
            lessonTopic: L.title,
            unit: L.unit, lesson: L.lesson, taskIndex: i,
          },
        });
        clearInterval(ticker);

        if (error) {
          let body = null;
          try { body = await error.context.json(); } catch {}
          fb.className = 'practice-ai-row show wrong';
          if (body?.error === 'rate_limited_minute') {
            let secs = body.retryAfterSeconds || 30;
            fb.textContent = `AI feedback is busy — you can retry in ${secs}s`;
            const countdown = setInterval(() => {
              secs--;
              if (secs <= 0) { clearInterval(countdown); fb.className = 'practice-ai-row'; }
              else fb.textContent = `AI feedback is busy — you can retry in ${secs}s`;
            }, 1000);
          } else if (body?.error === 'rate_limited_day' || body?.error === 'quota_global') {
            const h = Math.floor((body.resetsInMinutes || 0) / 60);
            const m = (body.resetsInMinutes || 0) % 60;
            fb.textContent = `Good practice today! The checker is resting — it'll be back in ${h}h ${m}m.`;
          } else {
            fb.textContent = 'The checker had a hiccup — try again in a moment.';
          }
          return;
        }

        localStorage.setItem(cacheKey, JSON.stringify(data));
        showVerdict(i, data);

        if (data.passed) {
          await db.from('practice_saves').upsert({
            user_id: session.user.id, unit: L.unit, lesson: L.lesson, task_index: i, code, passed: true,
          }, { onConflict: 'user_id,unit,lesson,task_index' });
        }
      } catch {
        clearInterval(ticker);
        fb.className = 'practice-ai-row show wrong';
        fb.textContent = 'Could not check your code right now — try again in a moment.';
      } finally {
        btn.disabled = false;
      }
    });
  });

})();

let pyodide = null;

async function getPyodide() {
  if (pyodide) return pyodide;
  document.getElementById('out-lines').innerHTML =
    '<div class="output-line" style="color:var(--ccm)">Loading Python...</div>';
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/' });
  return pyodide;
}

const INPUT_STUB = `def input(prompt=""):
    raise RuntimeError("input() isn't supported here yet - put the value in a variable instead!")
`;

async function runIsolated(code) {
  const py = await getPyodide();
  let output = '';
  py.setStdout({ batched: text => { output += text + '\n'; } });
  const namespace = py.globals.get('dict')();
  try {
    py.runPython(INPUT_STUB, { globals: namespace });
    py.runPython(code, { globals: namespace });
    return { output, error: null };
  } catch (err) {
    return { output, error: err.message };
  } finally {
    namespace.destroy();
  }
}

document.getElementById('run-btn').addEventListener('click', async () => {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  const outEl = document.getElementById('out-lines');
  const { output, error } = await runIsolated(editor.state.doc.toString());
  if (error) {
    outEl.innerHTML = `<div class="output-line output-error">${escapeHTML(error)}</div>`;
  } else {
    outEl.innerHTML = output
      ? output.trimEnd().split('\n').map(l => `<div class="output-line">${escapeHTML(l)}</div>`).join('')
      : '<div class="output-line" style="color:var(--ccm)">No output</div>';
  }
  btn.disabled = false;
  btn.textContent = 'Run';
});

</script>
</body>
</html>

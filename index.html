<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Python</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f8fa;
      color: #111827;
      margin: 0;
      padding-bottom: 60px;
      transition: background 0.2s, color 0.2s;
    }

    body.dark { background: #0f1117; color: #e8eaf0; }

    nav {
      background: white;
      border-bottom: 1px solid #e2e5ea;
      padding: 14px 24px;
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s, border-color 0.2s;
    }

    body.dark nav { background: #1a1d27; border-bottom-color: #2d3148; }

    nav span { font-weight: 600; font-size: 15px; color: #1F3A5F; }
    body.dark nav span { color: #93b4e0; }

    .theme-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #f0f2f5;
        border: 1px solid #e2e5ea;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4b5563;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .theme-btn:hover { 
        background: #e2e5ea; 
    }

    body.dark .theme-btn { 
        background: #222535; border-color: #2d3148; color: #9da3b4; 
    }

    body.dark .theme-btn:hover { 
        background: #2d3148; 
    }

body:not(.dark) .moon { display: none; }
body.dark .sun { display: none; }

body:not(.dark) .moon { display: none; }
body.dark .sun { display: none; }

    body.dark .theme-btn { border-color: #2d3148; color: #9da3b4; }
    .theme-btn:hover { background: #f0f2f5; }
    body.dark .theme-btn:hover { background: #222535; }

    .hero {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .hero img { width: 64px; height: 64px; }

    .hero h1 {
      font-size: 32px;
      font-weight: 600;
      color: #1F3A5F;
      margin: 0 0 6px;
      transition: color 0.2s;
    }

    body.dark .hero h1 { color: #93b4e0; }

    .hero p {
      font-size: 15px;
      color: #4b5563;
      line-height: 1.7;
      margin: 0;
      transition: color 0.2s;
    }

    body.dark .hero p { color: #9da3b4; }

    .course {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .unit {
      background: white;
      border: 1px solid #e2e5ea;
      border-radius: 12px;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }

    body.dark .unit { background: #1a1d27; border-color: #2d3148; }

    .unit-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e2e5ea;
      transition: border-color 0.2s;
    }

    body.dark .unit-header { border-bottom-color: #2d3148; }

    .unit-header small {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #9ca3af;
      display: block;
      margin-bottom: 2px;
    }

    .unit-header strong { font-size: 15px; color: #1F3A5F; transition: color 0.2s; }
    body.dark .unit-header strong { color: #93b4e0; }

    .unit a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid #f0f2f5;
      color: #111827;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.1s, color 0.2s, border-color 0.2s;
    }

    body.dark .unit a { color: #9da3b4; border-bottom-color: #222535; }
    .unit a:last-child { border-bottom: none; }
    .unit a:hover { background: #f7f8fa; }
    body.dark .unit a:hover { background: #222535; }

    .num {
      width: 44px;
      height: 26px;
      border-radius: 6px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    body.dark .num { background: #172038; color: #93c5fd; border-color: #1e3a5f; }

    .unit a span { flex: 1; }
    .unit a svg { color: #d1d5db; transition: color 0.1s; }
    .unit a:hover svg { color: #2563eb; }
  </style>
</head>
<body>

<nav>
  <span>Learn Python</span>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">
  <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
</nav>

<div class="hero">
  <img src="https://s3.dualstack.us-east-2.amazonaws.com/pythondotorg-assets/media/community/logos/python-logo-only.png" alt="Python logo">
  <div>
    <h1>Learn Python</h1>
    <p>A beginner-friendly course covering the fundamentals of Python — from your first program to loops, functions, and lists.</p>
  </div>
</div>

<main class="course" id="course"></main>

<script src="course-info.js"></script>
<script>

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }

  document.getElementById('course').innerHTML = units.map(unit => `
    <div class="unit">
      <div class="unit-header">
        <small>Unit ${unit.number}</small>
        <strong>${unit.title}</strong>
      </div>
      ${unit.lessons.map(lesson => `
        <a href="${encodeURI(`Unit ${unit.number}/lesson ${lesson.number}/lesson ${lesson.number}.html`)}">
          <span class="num">${unit.number}.${lesson.number}</span>
          <span>${lesson.title}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>`).join('')}
    </div>`).join('');
</script>

</body>
</html>
